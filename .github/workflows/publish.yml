name: Build and Publish lily-pwsh Image

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image (sterile)
        run: |
          docker build -t lily-base .

      - name: Create and start container
        id: container
        run: |
          CONTAINER_ID=$(docker create lily-base)
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV
          docker start $CONTAINER_ID

      - name: Create /mnt/repo-scripts inside container
        run: |
          docker exec $CONTAINER_ID mkdir -p /mnt/repo-scripts

      - name: Copy installer script into container
        run: |
          docker cp scripts/Install-AzureModules.ps1 $CONTAINER_ID:/mnt/repo-scripts/Install-AzureModules.ps1

      # ⭐ NO MODULE INSTALL STEP — YOU ASKED TO REMOVE IT

      - name: Commit sterile image with script included
        run: |
          docker commit $CONTAINER_ID ghcr.io/revpixel/lily-pwsh:latest

      - name: Push image
        run: |
          docker push ghcr.io/revpixel/lily-pwsh:latest
